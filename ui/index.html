<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Agent Harness Chat</title>
  <style>
    * { box-sizing: border-box; }

    :root {
      color-scheme: dark;
      --bg: #0a0a0a;
      --panel: #141414;
      --panel-2: #1c1c1c;
      --line: #2a2a2a;
      --text: #e6e6e6;
      --muted: #969696;
      --accent: #4a9eff;
      --ok: #2ecc71;
      --warn: #f39c12;
      --bad: #e74c3c;
      --user: #1a3a5c;
      --assistant: #1e1e1e;
    }

    html, body {
      margin: 0;
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      display: flex;
      flex-direction: column;
    }

    header {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 12px;
      padding: 14px;
      border-bottom: 1px solid var(--line);
      background: var(--panel);
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .field label {
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
    }

    input, textarea, button {
      font: inherit;
      color: var(--text);
      background: var(--panel-2);
      border: 1px solid #353535;
      border-radius: 8px;
      padding: 10px 12px;
      outline: none;
    }

    input:focus, textarea:focus {
      border-color: var(--accent);
    }

    .status {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 6px;
      font-size: 13px;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 999px;
      background: #666;
      flex-shrink: 0;
    }

    .dot.ok { background: var(--ok); }
    .dot.warn { background: var(--warn); }
    .dot.bad { background: var(--bad); }

    .meta {
      color: var(--muted);
      font-size: 12px;
      margin-top: 2px;
    }

    #messages {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 10px;
      padding: 16px;
      transition: background 220ms ease;
    }

    #messages.resetting {
      background: #15283e;
    }

    .message {
      max-width: min(80%, 800px);
      padding: 10px 13px;
      border-radius: 12px;
      line-height: 1.45;
      white-space: pre-wrap;
      word-break: break-word;
      border: 1px solid transparent;
    }

    .message.user {
      align-self: flex-end;
      background: var(--user);
      border-color: #254f7a;
    }

    .message.agent {
      align-self: flex-start;
      background: var(--assistant);
      border-color: #303030;
    }

    .message.system {
      align-self: center;
      background: transparent;
      border-color: transparent;
      color: var(--muted);
      font-size: 12px;
      max-width: 90%;
      text-align: center;
    }

    .typing::after {
      content: " ▋";
      color: var(--accent);
      animation: blink 0.8s steps(1) infinite;
    }

    @keyframes blink { 50% { opacity: 0; } }

    .composer {
      display: flex;
      gap: 10px;
      padding: 12px;
      border-top: 1px solid var(--line);
      background: var(--panel);
      align-items: stretch;
    }

    #messageInput {
      resize: vertical;
      min-height: 44px;
      max-height: 180px;
      flex: 1;
    }

    #sendBtn,
    #recordBtn {
      min-width: 96px;
      font-weight: 600;
      cursor: pointer;
    }

    #sendBtn {
      background: var(--accent);
      border-color: #3d8be0;
      color: white;
    }

    #recordBtn {
      background: #2a2a2a;
      border-color: #3a3a3a;
    }

    #recordBtn.recording {
      background: #5b1f1f;
      border-color: #8a2e2e;
      color: #ffd9d9;
    }

    #sendBtn:disabled,
    #recordBtn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
  </style>
</head>
<body>
  <header>
    <div class="field">
      <label for="tokenInput">Bearer token</label>
      <input id="tokenInput" type="password" placeholder="paste token" autocomplete="off" />
    </div>

    <div class="field">
      <label for="userIdInput">User ID (session key)</label>
      <input id="userIdInput" type="text" placeholder="e.g. user-123" autocomplete="off" />
      <div class="meta">Changing user ID clears chat and starts a new session.</div>
    </div>

    <div class="field">
      <label>Session</label>
      <div class="status">
        <span id="statusDot" class="dot"></span>
        <span id="statusText">Disconnected</span>
      </div>
      <div class="meta" id="sessionText">User: -</div>
    </div>
  </header>

  <main id="messages"></main>

  <div class="composer">
    <textarea id="messageInput" placeholder="Type a message and press Enter…"></textarea>
    <button id="recordBtn" type="button" title="Record voice input">🎙️ Voice</button>
    <button id="sendBtn" type="button">Send</button>
  </div>

  <script>
    const STORAGE = {
      token: "harness_token",
      userId: "harness_user_id",
    };

    const tokenInput = document.getElementById("tokenInput");
    const userIdInput = document.getElementById("userIdInput");
    const statusDot = document.getElementById("statusDot");
    const statusText = document.getElementById("statusText");
    const sessionText = document.getElementById("sessionText");
    const messagesEl = document.getElementById("messages");
    const messageInput = document.getElementById("messageInput");
    const sendBtn = document.getElementById("sendBtn");
    const recordBtn = document.getElementById("recordBtn");

    let sending = false;
    let mediaRecorder = null;
    let recordingChunks = [];
    let recordingStream = null;

    tokenInput.value = localStorage.getItem(STORAGE.token) || "";
    userIdInput.value = localStorage.getItem(STORAGE.userId) || "default-user";
    updateSessionText();

    tokenInput.addEventListener("input", () => {
      localStorage.setItem(STORAGE.token, tokenInput.value);
      void healthCheck();
    });

    userIdInput.addEventListener("change", () => {
      const next = userIdInput.value.trim() || "default-user";
      userIdInput.value = next;
      localStorage.setItem(STORAGE.userId, next);
      clearMessages(true);
      addMessage("system", `Started new session: ${next}`);
      updateSessionText();
      setStatus("warn", "Session switched (chat reset)");
      void healthCheck();
    });

    messageInput.addEventListener("keydown", (event) => {
      if (event.key === "Enter" && !event.shiftKey) {
        event.preventDefault();
        void sendTextMessage();
      }
    });

    sendBtn.addEventListener("click", () => void sendTextMessage());
    recordBtn.addEventListener("click", () => void toggleRecording());

    function authHeaders() {
      const token = tokenInput.value.trim();
      return {
        Authorization: `Bearer ${token}`,
      };
    }

    function currentUserId() {
      return userIdInput.value.trim() || "default-user";
    }

    function updateSessionText() {
      sessionText.textContent = `User: ${currentUserId()}`;
    }

    function setStatus(kind, text) {
      statusDot.className = `dot ${kind || ""}`;
      statusText.textContent = text;
    }

    function clearMessages(withVisualReset = false) {
      messagesEl.innerHTML = "";
      if (!withVisualReset) return;
      messagesEl.classList.add("resetting");
      window.setTimeout(() => messagesEl.classList.remove("resetting"), 260);
    }

    function addMessage(role, text) {
      const node = document.createElement("div");
      node.className = `message ${role}`;
      node.textContent = text;
      messagesEl.appendChild(node);
      messagesEl.scrollTop = messagesEl.scrollHeight;
      return node;
    }

    function setBusyState(isBusy) {
      sending = isBusy;
      sendBtn.disabled = isBusy;
      recordBtn.disabled = isBusy;
    }

    async function healthCheck() {
      if (!tokenInput.value.trim()) {
        setStatus("bad", "Disconnected (missing token)");
        return;
      }

      try {
        setStatus("warn", "Checking /health…");
        const response = await fetch("/health", {
          method: "GET",
          headers: {
            ...authHeaders(),
          },
        });

        if (response.ok) {
          setStatus("ok", "Connected");
          return;
        }

        if (response.status === 401 || response.status === 403) {
          setStatus("bad", "Disconnected (invalid token)");
          return;
        }

        setStatus("bad", `Disconnected (health ${response.status})`);
      } catch {
        setStatus("bad", "Disconnected (server unreachable)");
      }
    }

    async function sendTextMessage() {
      if (sending) return;
      const text = messageInput.value.trim();
      if (!text) return;

      messageInput.value = "";
      await sendStreamRequest({
        outgoingLabel: text,
        payloadBuilder: () => ({
          type: "json",
          body: {
            userId: currentUserId(),
            message: text,
          },
        }),
      });
    }

    async function sendAudioMessage(audioBlob) {
      if (sending) return;

      const typedMessage = messageInput.value.trim();
      messageInput.value = "";

      const kb = Math.max(1, Math.round(audioBlob.size / 1024));
      const label = typedMessage
        ? `🎤 Voice (${kb} KB) + text: ${typedMessage}`
        : `🎤 Voice (${kb} KB)`;

      await sendStreamRequest({
        outgoingLabel: label,
        payloadBuilder: () => {
          const form = new FormData();
          form.set("userId", currentUserId());
          if (typedMessage) form.set("message", typedMessage);
          form.set("audio", audioBlob, `voice-${Date.now()}.ogg`);

          return {
            type: "form",
            body: form,
          };
        },
      });
    }

    async function sendStreamRequest({ outgoingLabel, payloadBuilder }) {
      if (!tokenInput.value.trim()) {
        addMessage("system", "Set bearer token first.");
        setStatus("bad", "Disconnected (missing token)");
        return;
      }

      setBusyState(true);
      addMessage("user", outgoingLabel);
      const agentNode = addMessage("agent", "");
      agentNode.classList.add("typing");

      try {
        setStatus("warn", "Streaming response…");

        const payload = payloadBuilder();
        const headers = {
          ...authHeaders(),
        };

        let body;
        if (payload.type === "json") {
          headers["Content-Type"] = "application/json";
          body = JSON.stringify(payload.body);
        } else {
          body = payload.body;
        }

        const response = await fetch("/chat/stream", {
          method: "POST",
          headers,
          body,
        });

        if (!response.ok || !response.body) {
          const errorBody = await response.text();
          throw new Error(`HTTP ${response.status}: ${errorBody || "request failed"}`);
        }

        const reader = response.body.getReader();
        const decoder = new TextDecoder();
        let buffer = "";
        let full = "";

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;

          buffer += decoder.decode(value, { stream: true });
          const chunks = buffer.split(/\r?\n\r?\n/);
          buffer = chunks.pop() || "";

          for (const chunk of chunks) {
            const lines = chunk.split(/\r?\n/).map((line) => line.trimEnd());
            const eventLine = lines.find((line) => line.startsWith("event:"));
            const dataLine = lines.find((line) => line.startsWith("data:"));
            if (!dataLine) continue;

            const event = eventLine ? eventLine.slice(6).trim() : "message";
            const payloadRaw = dataLine.slice(5).trim();

            let data;
            try {
              data = JSON.parse(payloadRaw);
            } catch {
              continue;
            }

            if (event === "delta" && typeof data.delta === "string") {
              full += data.delta;
              agentNode.textContent = full;
              messagesEl.scrollTop = messagesEl.scrollHeight;
            } else if (event === "done" && typeof data.text === "string") {
              if (!full) {
                full = data.text;
                agentNode.textContent = full;
              }
            } else if (event === "error") {
              throw new Error(typeof data.error === "string" ? data.error : "stream error");
            }
          }
        }

        if (!full) {
          agentNode.textContent = "(empty response)";
        }

        setStatus("ok", "Connected");
      } catch (error) {
        const message = error instanceof Error ? error.message : "unknown";
        agentNode.textContent = `Error: ${message}`;
        setStatus("bad", "Disconnected (request failed)");
      } finally {
        agentNode.classList.remove("typing");
        setBusyState(false);
        messageInput.focus();
      }
    }

    async function toggleRecording() {
      if (mediaRecorder && mediaRecorder.state === "recording") {
        mediaRecorder.stop();
        return;
      }

      if (!navigator.mediaDevices?.getUserMedia) {
        addMessage("system", "Voice recording not supported in this browser.");
        return;
      }

      try {
        recordingStream = await navigator.mediaDevices.getUserMedia({ audio: true });

        const preferred = ["audio/ogg;codecs=opus", "audio/ogg"];
        const mimeType = preferred.find((type) => {
          if (!window.MediaRecorder || !MediaRecorder.isTypeSupported) return false;
          return MediaRecorder.isTypeSupported(type);
        });

        mediaRecorder = mimeType
          ? new MediaRecorder(recordingStream, { mimeType })
          : new MediaRecorder(recordingStream);

        recordingChunks = [];

        mediaRecorder.addEventListener("dataavailable", (event) => {
          if (event.data && event.data.size > 0) {
            recordingChunks.push(event.data);
          }
        });

        mediaRecorder.addEventListener("stop", async () => {
          try {
            const blob = new Blob(recordingChunks, {
              type: mediaRecorder?.mimeType || "audio/ogg",
            });
            await sendAudioMessage(blob);
          } finally {
            if (recordingStream) {
              for (const track of recordingStream.getTracks()) {
                track.stop();
              }
            }
            recordingStream = null;
            mediaRecorder = null;
            recordingChunks = [];
            recordBtn.classList.remove("recording");
            recordBtn.textContent = "🎙️ Voice";
          }
        }, { once: true });

        mediaRecorder.start(200);
        recordBtn.classList.add("recording");
        recordBtn.textContent = "⏹ Stop";
        setStatus("warn", "Recording voice input…");
      } catch (error) {
        addMessage("system", `Could not start microphone: ${error instanceof Error ? error.message : "unknown"}`);
        setStatus("bad", "Disconnected (microphone unavailable)");
      }
    }

    addMessage("system", "Ready. Enter token + user ID, then send text or voice.");
    void healthCheck();
    window.setInterval(() => void healthCheck(), 15000);
  </script>
</body>
</html>
